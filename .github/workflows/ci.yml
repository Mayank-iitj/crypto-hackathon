name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20.x'

jobs:
  backend-validate:
    name: Backend Validation
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      SECRET_KEY: test-secret-key-12345678901234567890
      DATABASE_URL: postgresql+asyncpg://qshield:test123@localhost:5432/qshield_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-core.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Verify backend source compiles
        run: python -m compileall backend/app backend/tests

      - name: Run backend smoke tests
        run: |
          cd backend
          pytest tests -v --cov=app --cov-report=xml

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend-validate:
    name: Frontend Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        env:
          CI: 'true'
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Audit Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -q -r backend/requirements.txt
          pip-audit --desc

      - name: Audit Node dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  docker-build:
    name: Build and Publish Images
    runs-on: ubuntu-latest
    needs: [backend-validate, frontend-validate]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to staging
        env:
          KUBECONFIG_CONTENT: ${{ secrets.STAGING_KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_CONTENT" ]; then
            echo 'STAGING_KUBECONFIG is not configured; staging deployment skipped.'
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
          echo 'Staging deployment configuration loaded.'
          kubectl apply -f deployment/kubernetes/qshield-api.yaml

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to production
        env:
          KUBECONFIG_CONTENT: ${{ secrets.PRODUCTION_KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_CONTENT" ]; then
            echo 'PRODUCTION_KUBECONFIG is not configured; production deployment skipped.'
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
          echo 'Production deployment configuration loaded.'
          kubectl apply -f deployment/kubernetes/qshield-k8s-production.yaml

  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [backend-validate, frontend-validate, docker-build]
    if: always()

    steps:
      - name: Create test report
        run: |
          echo "## Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend Validation: ${{ needs.backend-validate.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend Validation: ${{ needs.frontend-validate.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker Build: ${{ needs.docker-build.result }}" >> "$GITHUB_STEP_SUMMARY"
