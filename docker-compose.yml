version: '3.9'

name: qshield

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: qshield-postgres
    environment:
      POSTGRES_USER: qshield
      POSTGRES_PASSWORD: ${DB_PASSWORD:-qshield123}
      POSTGRES_DB: qshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qshield"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qshield-network

  # Redis Cache & Task Queue
  redis:
    image: redis:7-alpine
    container_name: qshield-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qshield-network

  # Q-Shield API Server
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qshield-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://qshield:${DB_PASSWORD:-qshield-secure-password}@postgres:5432/qshield
      DATABASE_POOL_SIZE: 30
      DATABASE_MAX_OVERFLOW: 20
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-secure-password}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      CORS_ORIGINS: '["https://dashboard.qshield.io", "https://app.qshield.io"]'
      ALLOWED_HOSTS: '["qshield.io", "*.qshield.io", "localhost", "127.0.0.1"]'
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      PLATFORM_SIGNING_KEY_PATH: /app/keys/platform_signing.pem
      PLATFORM_PUBLIC_KEY_PATH: /app/keys/platform_public.pem
      SECRET_KEY: ${SECRET_KEY:-change-me-with-strong-secret-key-in-production}
      OAUTH_ALLOW_REGISTRATION: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-placeholder}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-placeholder}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-placeholder}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-placeholder}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app:ro
      - ./keys:/app/keys:ro
      - ./logs:/var/log/qshield
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - qshield-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: qshield-prometheus
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--log.level=info'
    networks:
      - qshield-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: qshield-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_SECURITY_ADMIN_USER: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_SECURITY_DISABLE_BRUTE_FORCE_LOGIN_PROTECTION: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployment/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - qshield-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Elasticsearch Logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: qshield-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - qshield-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Kibana Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: qshield-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      KIBANA_DEFAULTAPPID: discover
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - qshield-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  qshield-network:
    driver: bridge
