services:
  postgres:
    mem_limit: 768m
    cpus: 1.0

  redis:
    mem_limit: 256m
    cpus: 0.5

  api:
    mem_limit: 1g
    cpus: 1.5
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  prometheus:
    mem_limit: 512m
    cpus: 0.75

  grafana:
    mem_limit: 384m
    cpus: 0.5

  elasticsearch:
    mem_limit: 1g
    cpus: 1.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"

  kibana:
    mem_limit: 768m
    cpus: 0.75

  frontend:
    mem_limit: 384m
    cpus: 0.5
