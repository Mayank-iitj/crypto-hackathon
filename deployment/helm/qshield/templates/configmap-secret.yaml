apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "qshield.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qshield.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  DATABASE_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | quote }}
  SECRET_KEY: {{ randAlphaNum 32 | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.oauth.google.clientId | default "changeme" | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.oauth.google.clientSecret | default "changeme" | quote }}
  GITHUB_CLIENT_ID: {{ .Values.oauth.github.clientId | default "changeme" | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.oauth.github.clientSecret | default "changeme" | quote }}
