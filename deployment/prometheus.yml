global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: qshield

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: qshield-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 30s
